name: CI - Validar ETL Supermercado

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Validar sintaxis notebooks Python
        run: |
          echo "Validando archivos .py..."
          for f in proceso/*.py; do
            python -m py_compile "$f" && echo "✔ OK: $f" || echo "✘ ERROR: $f"
          done

      - name: Verificar estructura de carpetas
        run: |
          echo "Verificando carpetas..."
          for d in prepamb proceso security reversion datasets dashboard evidencias; do
            [ -d "$d" ] && echo "✔ $d/" || echo "✘ Falta: $d"
          done

      - name: Pipeline validado
        run: echo "✔ ETL Supermercado validado correctamente"
